name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend-vue
        run: npm ci

      - name: Build Vue app
        working-directory: ./frontend-vue
        run: npm run build

      - name: Done
        run: echo "✅ Frontend build sukses"